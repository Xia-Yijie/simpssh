name: Build & Release APK

# push / tag / PR / 手动触发都会跑完整构建。只有 tag(`v*`)会走 release
# 签名 + 发布。main/PR 上传的是未签名 release 或 debug artifact,7 天保留。
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          add-to-path: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Rust core for arm64-v8a
        working-directory: core
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs build --release

      - name: Regenerate uniffi Kotlin bindings
        working-directory: core
        run: |
          cargo run --bin uniffi-bindgen -- \
            generate \
            --library ./target/aarch64-linux-android/release/libsimpssh_core.so \
            --language kotlin \
            --out-dir ../android/app/src/main/java

      # Tag 构建时把 keystore 从 secret 解出来放到 Gradle 预期的路径。
      # 没有 secret / 不是 tag 时这步跳过,Gradle 回退到 debug 签名(见 build.gradle.kts)。
      - name: Restore release keystore
        if: startsWith(github.ref, 'refs/tags/v') && env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p android/signing
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/signing/simpssh-release.jks
          cat > android/signing/keystore.properties <<EOF
          storeFile=signing/simpssh-release.jks
          storePassword=${RELEASE_KEYSTORE_PASSWORD}
          keyAlias=simpssh
          keyPassword=${RELEASE_KEY_PASSWORD}
          EOF

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            ./gradlew --no-daemon assembleRelease
          else
            ./gradlew --no-daemon assembleDebug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: simpssh-apk
          path: android/app/build/outputs/apk/**/simpssh-*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/simpssh-*-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
