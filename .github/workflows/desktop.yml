name: desktop

# 在三个 runner 上并行出 Windows NSIS / macOS DMG / Linux DEB。推 tag
# (vX.Y.Z) 时自动建 Release 并挂所有产物;push 到 main 只构建不发布。
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'desktop/**'
      - 'core/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

permissions:
  contents: write  # softprops/action-gh-release 上传产物需要

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact-glob: |
              desktop/src-tauri/target/release/bundle/nsis/*.exe
            artifact-name: windows
          - os: macos-14
            rust-target: aarch64-apple-darwin
            artifact-glob: |
              desktop/src-tauri/target/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            artifact-name: macos-arm64
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            artifact-glob: |
              desktop/src-tauri/target/release/bundle/deb/*.deb
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            artifact-name: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Tauri build
        working-directory: desktop
        run: npm run tauri build -- --target ${{ matrix.rust-target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: simpssh-desktop-${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-glob }}
          fail_on_unmatched_files: false
